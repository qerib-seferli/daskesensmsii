<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Daşkəsən SMSİİ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #003366; --bg: #f0f2f5; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--main); color: white; min-height: 100vh; padding: 25px; position: fixed; }
        .main { margin-left: 290px; padding: 40px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

        .btn-save { background: var(--success); color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; font-size: 16px; }
        .btn-save:hover { opacity: 0.9; }

        /* Sətir tipli xəbər siyahısı */
        .news-list-container { display: flex; flex-direction: column; gap: 15px; }
        .news-row { 
            display: flex; background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; 
            height: 160px; /* Sabit hündürlük */
        }
        
        /* Balaca şəkil konteyneri */
        .img-box { 
            width: 130px; /* Şəkil ölçüsü kiçildildi */
            height: 100%; position: relative; flex-shrink: 0; background: #eee; 
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Karusel düymələri */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: none; width: 25px; height: 25px;
            cursor: pointer; font-size: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .prev-btn { left: 5px; }
        .next-btn { right: 5px; }

        .news-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .news-info h4 { margin: 0; font-size: 16px; color: var(--main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .news-info p { margin: 5px 0; font-size: 13px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .news-footer small { color: #888; font-size: 12px; }

        .actions { display: flex; gap: 8px; }
        .btn-edit { background: #ffc107; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Daşkəsən SMSİİ Admin</h2>
    <hr style="opacity: 0.2; margin: 20px 0;">
    <p><i class="fas fa-newspaper"></i> Xəbər İdarəetmə</p>
    <button onclick="_supabase.auth.signOut().then(()=>location.reload())" style="margin-top:50px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3); padding:10px; width:100%; cursor:pointer; border-radius:5px;">Çıxış</button>
</div>

<div class="main">
    <div class="card">
        <h3 id="form-title"><i class="fas fa-plus-circle"></i> Xəbər Əlavə Et</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="title" placeholder="Xəbər başlığı">
        <textarea id="desc" placeholder="Xəbərin geniş mətni bura yazılır..."></textarea>
        
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="flex:1">
                <label>Tarix:</label>
                <input type="date" id="news-date">
            </div>
            <div style="flex:2">
                <label>Şəkillər:</label>
                <input type="file" id="news-files" multiple accept="image/*">
            </div>
        </div>
        <button class="btn-save" id="save-btn" onclick="saveNews()">SİSTEMƏ YADDA SAXLA</button>
        <button onclick="clearForm()" style="margin-top: 10px; background: #6c757d; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s;">FORMU TƏMİZLƏ</button>
    </div>

    <h3>Mövcud Xəbərlər</h3>
    <div id="news-list" class="news-list-container">
        <p>Yüklənir...</p>
    </div>
</div>

<script src="supabase-config.js"></script>
<script>
    checkAuth();

    async function saveNews() {
        const btn = document.getElementById('save-btn');
        const id = document.getElementById('edit-id').value;
        const titleInput = document.getElementById('title');
        const descInput = document.getElementById('desc');
        const dateInput = document.getElementById('news-date');
        const fileInput = document.getElementById('news-files');

        if(!titleInput.value || !descInput.value) return alert("Başlıq və mətn doldurulmalıdır!");

        btn.disabled = true;
        btn.innerText = "Gözləyin...";

        try {
            let imageUrls = [];
            if (fileInput.files.length > 0) {
                for (const file of fileInput.files) {
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}`;
                    const filePath = `uploads/${fileName}`;
                    const { error: uploadError } = await _supabase.storage.from('xeber-media').upload(filePath, file);
                    if (uploadError) throw uploadError;
                    const { data } = _supabase.storage.from('xeber-media').getPublicUrl(filePath);
                    imageUrls.push(data.publicUrl);
                }
            }

            const newsData = { 
                basliq: titleInput.value, 
                aciqlama: descInput.value, 
                tarix: dateInput.value || new Date().toISOString().split('T')[0] 
            };
            if(imageUrls.length > 0) newsData.sekiller = imageUrls;

            const { error } = id ? 
                await _supabase.from('xeberler').update(newsData).eq('id', id) : 
                await _supabase.from('xeberler').insert([newsData]);

            if (error) throw error;

            alert("Uğurla tamamlandı!");
            
            // FORMU TƏMİZLƏ
            document.getElementById('edit-id').value = "";
            titleInput.value = "";
            descInput.value = "";
            dateInput.value = "";
            fileInput.value = "";
            document.getElementById('form-title').innerHTML = '<i class="fas fa-plus-circle"></i> Xəbər Əlavə Et';
            btn.innerText = "SİSTEMƏ YADDA SAXLA";
            
            ();

        } catch (err) {
            alert("Xəta: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function loadNews() {
        try {
            const { data, error } = await _supabase.from('xeberler').select('*').order('id', { ascending: false });
            if (error) throw error;
            const list = document.getElementById('news-list');
            list.innerHTML = "";
            
            data.forEach(n => {
                const images = n.sekiller || [];
                const div = document.createElement('div');
                div.className = 'news-row';
                
                // Karusel məntiqi üçün HTML
                let imgHtml = `<img src="${images[0] || 'https://via.placeholder.com/130x160?text=Yoxdur'}" id="img-${n.id}">`;
                if(images.length > 1) {
                    imgHtml += `
                        <button class="nav-btn prev-btn" onclick="changeImg(${n.id}, ${JSON.stringify(images).replace(/"/g, '&quot;')}, -1)"><i class="fas fa-chevron-left"></i></button>
                        <button class="nav-btn next-btn" onclick="changeImg(${n.id}, ${JSON.stringify(images).replace(/"/g, '&quot;')}, 1)"><i class="fas fa-chevron-right"></i></button>
                    `;
                }

                div.innerHTML = `
                    <div class="img-box" data-index="0">${imgHtml}</div>
                    <div class="news-info">
                        <div>
                            <h4>${n.basliq}</h4>
                            <p>${n.aciqlama}</p>
                        </div>
                        <div class="news-footer">
                            <small><i class="far fa-calendar-alt"></i> ${n.tarix}</small>
                            <div class="actions">
                                <button class="btn-edit" onclick='setEdit(${JSON.stringify(n).replace(/'/g, "&apos;")})'>Düzəlt</button>
                                <button class="btn-delete" onclick="deleteNews(${n.id}, ${JSON.stringify(n.sekiller)})">Sil</button>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (err) { console.log(err); }
    }

    // Şəkil Dəyişmə Funksiyası
    window.changeImg = (id, imgs, dir) => {
        const imgTag = document.getElementById(`img-${id}`);
        const box = imgTag.parentElement;
        let currentIndex = parseInt(box.getAttribute('data-index'));
        currentIndex += dir;
        if(currentIndex >= imgs.length) currentIndex = 0;
        if(currentIndex < 0) currentIndex = imgs.length - 1;
        imgTag.src = imgs[currentIndex];
        box.setAttribute('data-index', currentIndex);
    };

    window.setEdit = (n) => {
        document.getElementById('edit-id').value = n.id;
        document.getElementById('title').value = n.basliq;
        document.getElementById('desc').value = n.aciqlama;
        document.getElementById('news-date').value = n.tarix;
        document.getElementById('form-title').innerHTML = '<i class="fas fa-edit"></i> Xəbəri Redaktə Et';
        document.getElementById('save-btn').innerText = "DƏYİŞİKLİKLƏRİ YADDA SAXLA";
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    async function deleteNews(id, imgs) {
        if (!confirm("Silinsin?")) return;
        try {
            if(imgs && imgs.length > 0) {
                const paths = imgs.map(u => u.split('xeber-media/')[1]);
                await _supabase.storage.from('xeber-media').remove(paths);
            }
            await _supabase.from('xeberler').delete().eq('id', id);

    function clearForm() {
    // ID-ləri tap və təmizlə
    document.getElementById('edit-id').value = "";
    document.getElementById('title').value = "";
    document.getElementById('desc').value = "";
    document.getElementById('news-date').value = "";
    document.getElementById('news-files').value = ""; // Seçilmiş şəkilləri silir

    // Yazıları və düyməni əvvəlki vəziyyətinə qaytar
    document.getElementById('form-title').innerHTML = '<i class="fas fa-plus-circle"></i> Xəbər Əlavə Et';
    const saveBtn = document.getElementById('save-btn');
    saveBtn.innerText = "SİSTEMƏ YADDA SAXLA";
    saveBtn.style.background = "#28a745"; // Yaşıl rəngə qaytarır
    
    console.log("Form təmizləndi.");
    }
            
            loadNews();
        } catch (err) { alert(err.message); }
    }

    ();
    
</script>
</body>
</html>
