<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daşkəsən SMSİİ | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f4f8; color: #1f2937; }

        .page { min-height: 100vh; padding: 24px 14px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 1px solid #dbeafe; margin-bottom: 20px; }

        /* Topbar */
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .topbar h1 { color: #003366; font-size: 1.4rem; }
        .topbar p { font-size: 0.9rem; color: #64748b; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { padding: 25px; }
        .panel h2 { color: #003366; margin-bottom: 20px; font-size: 1.2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }

        /* Form Fields */
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 6px; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .field input, .field textarea { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 0.95rem; transition: 0.2s;
        }
        .field textarea { 
            min-height: 200px; 
            resize: vertical; /* Yalnız yuxarı-aşağı genişlənir */
        }
        .field input:focus, .field textarea:focus { border-color: #003366; box-shadow: 0 0 0 3px rgba(0,51,102,0.1); }

        /* Buttons */
        .btn { border: none; cursor: pointer; border-radius: 10px; padding: 12px 20px; font-weight: 700; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #003366; color: #fff; width: 100%; }
        .btn-primary:hover { background: #002244; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-danger { background: #be123c; color: #fff; padding: 8px 15px; }
        .btn-edit { background: #f59e0b; color: #fff; padding: 8px 15px; margin-right: 5px; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* News List Items */
        .news-item { 
            display: flex; gap: 15px; padding: 15px; border: 1px solid #f1f5f9; border-radius: 12px; background: #fff; margin-bottom: 12px; transition: 0.3s;
        }
        .news-item:hover { border-color: #003366; }
        .news-item img { 
            width: 120px; 
            aspect-ratio: 5 / 4; /* 5x4 Ölçüsü */
            object-fit: cover; border-radius: 8px; background: #f8fafc; 
        }
        .news-item-body { flex: 1; }
        .news-item-body h3 { font-size: 1rem; color: #0f172a; margin-bottom: 5px; }
        .news-meta { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; }

        /* Responsive */
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <div class="card topbar">
                <div>
                    <h1>Daşkəsən SMSİİ Admin Panel</h1>
                    <p>Xəbərləri idarə etmə sistemi</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="window.open('../index.html')">Sayta Bax</button>
                    <button class="btn btn-danger" onclick="logout()">Çıxış</button>
                </div>
            </div>

            <div class="grid">
                <div class="card panel">
                    <h2 id="formTitle">Yeni Xəbər Əlavə Et</h2>
                    <input type="hidden" id="editId">
                    
                    <div class="field">
                        <label>Xəbər Başlığı</label>
                        <input type="text" id="newsTitle" placeholder="Başlığı daxil edin...">
                    </div>

                    <div class="field">
                        <label>Tarix</label>
                        <input type="date" id="newsDate">
                    </div>

                    <div class="field">
                        <label>Xəbər Mətni</label>
                        <textarea id="newsContent" placeholder="Ətraflı məlumat yazın..."></textarea>
                    </div>

                    <div class="field">
                        <label>Şəkillər (5x4 tövsiyə olunur)</label>
                        <input type="file" id="newsFiles" accept="image/*" multiple>
                    </div>

                    <button class="btn btn-primary" id="saveBtn" onclick="saveNews()">SİSTEMƏ YÜKLƏ</button>
                    <button class="btn btn-secondary" id="cancelBtn" style="display:none; width:100%; margin-top:10px;" onclick="resetForm()">Ləğv Et</button>
                </div>

                <div class="card panel">
                    <h2>Mövcud Xəbərlər</h2>
                    <div id="newsList">
                        <p style="text-align:center; color:#64748b; padding:20px;">Xəbərlər yüklənir...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        // Giriş yoxlaması
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) window.location.href = "login.html";
        }
        checkSession();

        function logout() { _supabase.auth.signOut().then(() => location.reload()); }

        // Formu sıfırlama
        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('newsTitle').value = "";
            document.getElementById('newsContent').value = "";
            document.getElementById('newsDate').value = "";
            document.getElementById('newsFiles').value = "";
            document.getElementById('formTitle').innerText = "Yeni Xəbər Əlavə Et";
            document.getElementById('cancelBtn').style.display = "none";
        }

        // Xəbər Yadda Saxla (Əlavə et və ya Yenilə)
        async function saveNews() {
            const btn = document.getElementById('saveBtn');
            const id = document.getElementById('editId').value;
            const title = document.getElementById('newsTitle').value;
            const content = document.getElementById('newsContent').value;
            const date = document.getElementById('newsDate').value;
            const files = document.getElementById('newsFiles').files;

            if (!title || !content) return alert("Başlıq və mətn mütləqdir!");

            btn.disabled = true;
            btn.innerText = "Gözləyin...";

            try {
                let imageUrls = [];
                // Şəkilləri yüklə (əgər seçilibsə)
                if (files.length > 0) {
                    for (const file of files) {
                        const path = `uploads/${Date.now()}_${file.name}`;
                        const { data, error } = await _supabase.storage.from('xeber-media').upload(path, file);
                        if (error) throw error;
                        const { data: url } = _supabase.storage.from('xeber-media').getPublicUrl(path);
                        imageUrls.push(url.publicUrl);
                    }
                }

                const payload = {
                    basliq: title,
                    aciqlama: content,
                    tarix: date || new Date().toISOString().split('T')[0]
                };
                if (imageUrls.length > 0) payload.sekiller = imageUrls;

                const { error } = id ? 
                    await _supabase.from('xeberler').update(payload).eq('id', id) : 
                    await _supabase.from('xeberler').insert([payload]);

                if (error) throw error;

                alert("Uğurla tamamlandı!");
                resetForm();
                loadNews();
            } catch (err) {
                alert("Xəta: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "SİSTEMƏ YÜKLƏ";
            }
        }

        // Xəbərləri Yüklə
        async function loadNews() {
            const container = document.getElementById('newsList');
            const { data, error } = await _supabase.from('xeberler').select('*').order('id', { ascending: false });

            if (error) return container.innerHTML = "Xəta baş verdi.";
            if (data.length === 0) return container.innerHTML = "Xəbər tapılmadı.";

            container.innerHTML = data.map(n => `
                <div class="news-item">
                    <img src="${n.sekiller?.[0] || 'https://via.placeholder.com/150x120?text=Yoxdur'}">
                    <div class="news-item-body">
                        <h3>${n.basliq}</h3>
                        <div class="news-meta"><i class="far fa-calendar"></i> ${n.tarix}</div>
                        <div>
                            <button class="btn btn-edit" onclick='editNews(${JSON.stringify(n).replace(/'/g, "&apos;")})'>Düzəlt</button>
                            <button class="btn btn-danger" onclick="deleteNews(${n.id}, ${JSON.stringify(n.sekiller)})">Sil</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Redaktə rejimi
        function editNews(n) {
            document.getElementById('editId').value = n.id;
            document.getElementById('newsTitle').value = n.basliq;
            document.getElementById('newsContent').value = n.aciqlama;
            document.getElementById('newsDate').value = n.tarix;
            document.getElementById('formTitle').innerText = "Xəbəri Redaktə Et";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Silmə
        async function deleteNews(id, imgs) {
            if (!confirm("Silmək istədiyinizə əminsiniz?")) return;
            
            if (imgs && imgs.length > 0) {
                const paths = imgs.map(u => u.split('xeber-media/')[1]);
                await _supabase.storage.from('xeber-media').remove(paths);
            }
            
            await _supabase.from('xeberler').delete().eq('id', id);
            loadNews();
        }

        loadNews();
    </script>
</body>
</html>
