<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Daşkəsən SMSİİ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #003366; --bg: #f0f2f5; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--main); color: white; min-height: 100vh; padding: 25px; position: fixed; }
        .main { margin-left: 290px; padding: 40px; width: calc(100% - 310px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; min-height: 150px; line-height: 1.6; }

        .btn-save { background: #28a745; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; font-size: 16px; }
        .btn-save:hover { background: #218838; opacity: 0.9; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .news-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
        
        /* Sənin istədiyin 4x5 Portrait Ölçüsü */
        .img-container { width: 100%; aspect-ratio: 4 / 5; overflow: hidden; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .news-content { padding: 15px; }
        .news-content h4 { margin: 0 0 10px 0; font-size: 15px; color: var(--main); height: 40px; overflow: hidden; }
        .actions { display: flex; gap: 8px; margin-top: 15px; }
        .btn-edit { flex: 1; background: #ffc107; border: none; padding: 8px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-delete { flex: 1; background: var(--danger); color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Daşkəsən SMSİİ Admin</h2>
    <hr style="opacity: 0.2; margin: 20px 0;">
    <p><i class="fas fa-newspaper"></i> Xəbər İdarəetmə</p>
    <button onclick="_supabase.auth.signOut().then(()=>location.reload())" style="margin-top:50px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3); padding:10px; width:100%; cursor:pointer; border-radius:5px;">Çıxış</button>
</div>

<div class="main">
    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> Xəbər Əlavə Et / Yenilə</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="title" placeholder="Xəbər başlığı (məs: Yeni tədbir keçirildi)">
        <textarea id="desc" placeholder="Xəbərin geniş mətni bura yazılır..."></textarea>
        
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="flex:1">
                <label>Tarix:</label>
                <input type="date" id="news-date">
            </div>
            <div style="flex:2">
                <label>Şəkillər (4x5 nisbəti):</label>
                <input type="file" id="news-files" multiple accept="image/*">
            </div>
        </div>
        <button class="btn-save" id="save-btn" onclick="saveNews()">SİSTEMƏ YADDA SAXLA</button>
    </div>

    <h3>Mövcud Xəbərlər</h3>
    <div id="news-list" class="news-grid">
        <p>Yüklənir...</p>
    </div>
</div>

<script src="supabase-config.js"></script>
<script>
    // Giriş yoxlaması
    checkAuth();

    async function saveNews() {
        const btn = document.getElementById('save-btn');
        const id = document.getElementById('edit-id').value;
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const dateInput = document.getElementById('news-date').value;
        const fileInput = document.getElementById('news-files');

        if(!title || !desc) return alert("Zəhmət olmasa başlıq və mətni doldurun!");

        btn.disabled = true;
        btn.innerText = "Yüklənir, gözləyin...";

        try {
            let imageUrls = [];
            
            // Şəkil yükləmə hissəsi
            if (fileInput.files.length > 0) {
                for (const file of fileInput.files) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const filePath = `uploads/${fileName}`;

                    const { error: uploadError } = await _supabase.storage
                        .from('xeber-media')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    const { data } = _supabase.storage.from('xeber-media').getPublicUrl(filePath);
                    imageUrls.push(data.publicUrl);
                }
            }

            const newsData = { 
                basliq: title, 
                aciqlama: desc, 
                tarix: dateInput || new Date().toISOString().split('T')[0] 
            };

            // Əgər yeni şəkil yüklənibsə array-i yenilə
            if(imageUrls.length > 0) newsData.sekiller = imageUrls;

            let error;
            if (id) {
                // Yeniləmə (Update)
                const { error: updateError } = await _supabase.from('xeberler').update(newsData).eq('id', id);
                error = updateError;
            } else {
                // Yeni əlavə (Insert)
                const { error: insertError } = await _supabase.from('xeberler').insert([newsData]);
                error = insertError;
            }

            if (error) throw error;

            alert("Uğurla tamamlandı!");
            location.reload();

        } catch (err) {
            console.error("Sistem xətası:", err);
            alert("Xəta baş verdi: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "SİSTEMƏ YADDA SAXLA";
        }
    }

    async function loadNews() {
        try {
            const { data, error } = await _supabase.from('xeberler').select('*').order('id', { ascending: false });
            if (error) throw error;

            const list = document.getElementById('news-list');
            list.innerHTML = "";
            
            data.forEach(n => {
                const div = document.createElement('div');
                div.className = 'news-card';
                div.innerHTML = `
                    <div class="img-container">
                        <img src="${n.sekiller?.[0] || 'https://via.placeholder.com/400x500?text=Sekil+Yoxdur'}">
                    </div>
                    <div class="news-content">
                        <h4>${n.basliq}</h4>
                        <small><i class="far fa-calendar-alt"></i> ${n.tarix}</small>
                        <div class="actions">
                            <button class="btn-edit" onclick='setEdit(${JSON.stringify(n).replace(/'/g, "&apos;")})'>Düzəlt</button>
                            <button class="btn-delete" onclick="deleteNews(${n.id}, ${JSON.stringify(n.sekiller)})">Sil</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (err) {
            console.log("Xəbərləri yükləyərkən xəta:", err);
        }
    }

    // Redaktə məlumatlarını forma doldurur
    window.setEdit = (n) => {
        document.getElementById('edit-id').value = n.id;
        document.getElementById('title').value = n.basliq;
        document.getElementById('desc').value = n.aciqlama;
        document.getElementById('news-date').value = n.tarix;
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    async function deleteNews(id, imgs) {
        if (!confirm("Bu xəbəri silmək istədiyinizə əminsiniz?")) return;
        
        try {
            // Əvvəlcə şəkilləri Storage-dan silirik
            if(imgs && imgs.length > 0) {
                const paths = imgs.map(u => u.split('xeber-media/')[1]);
                await _supabase.storage.from('xeber-media').remove(paths);
            }
            // Sonra databazadan silirik
            const { error } = await _supabase.from('xeberler').delete().eq('id', id);
            if(error) throw error;
            
            loadNews();
        } catch (err) {
            alert("Silinmə zamanı xəta: " + err.message);
        }
    }

    loadNews();
</script>
</body>
</html>
