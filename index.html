<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daşkəsən SMSİİ</title>

<link rel="manifest" href="manifest.json">

<meta name="description" content="Daşkəsən Su Meliorasiya Sistemlərinin İstismarı İdarəsi">
<meta name="keywords" content="daşkəsən, su, meliorasiya">

<style>
body{margin:0;font-family:sans-serif;background:#f4f8fb}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#0077b6;color:#fff}
.logo-area{display:flex;align-items:center;cursor:pointer}
.logo{width:45px;height:45px;border-radius:50%;margin-right:10px}
.contact-icons a{color:#fff;margin-left:15px;font-size:22px;text-decoration:none}

/* HERO */
.hero{background:url('fotolar/Fon.jpg') center/cover;height:300px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center}
.hero h1{margin:0}
#weather{margin-top:10px;background:#ffffffcc;color:#000;padding:6px 12px;border-radius:8px}

/* NEWS */
.section{padding:20px}
.news-container{display:flex;overflow-x:auto;gap:15px}
.news-card{min-width:260px;background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.news-card img{width:100%;border-radius:8px}
.news-card button{margin-top:10px;padding:5px 10px;background:#0077b6;color:#fff;border:none;border-radius:6px}

/* PAYMENT */
.payment-info{text-align:center;margin:20px}
.million-logo{width:120px}
.payment-cards{display:flex;flex-wrap:wrap;gap:15px;justify-content:center}
.payment-card{background:#fff;padding:15px;border-radius:10px;text-decoration:none;color:#000}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:500px}

/* FOOTER */
footer{background:#0077b6;color:#fff;padding:20px;text-align:center}

/* TOP BUTTON */
#topBtn{position:fixed;bottom:20px;right:20px;background:#0077b6;color:#fff;border:none;padding:10px;border-radius:50%}

</style>
</head>

<body>

<header class="header">
<div class="logo-area" onclick="location.href='/'">
<img src="fotolar/logo.jpg" class="logo">
<h2>Daşkəsən SMSİİ</h2>
</div>

<div class="contact-icons">
<a href="https://wa.me/994505459085">📱</a>
<a href="tel:(022)2155049">📞</a>
</div>
</header>

<section class="hero">
<h1>Daşkəsən Su Meliorasiya Sistemləri</h1>
<div id="weather">Yüklənir...</div>
</section>

<section class="section">
<h2>Son Xəbərlər</h2>
<div class="news-container" id="news"></div>
</section>

<section class="section">
<h2>Ödənişlər</h2>
<div class="payment-info">
<img src="fotolar/million.az.png" class="million-logo">
<p>Rahat, sürətli və təhlükəsiz ödəniş</p>
</div>

<div class="payment-cards">
<a href="https://million.az/services/communal/Azersu" target="_blank" class="payment-card">💧 ADSEA</a>
<a href="https://million.az/services/communal/Meliorasiya" target="_blank" class="payment-card">🌊 Meliorasiya</a>
</div>
</section>

<footer>
<p>📍 Daşkəsən şəhəri</p>
<p>📧 Daskesensmsii@rsmx.gov.az</p>
<p>⏰ 09:00 - 18:00</p>
<p>Full-stack Developer: Qərib Səfərli</p>
</footer>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" id="modalContent"></div>
</div>

<script>
// WEATHER
async function getWeather(){
let res = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Dashkasan&appid=YOUR_API_KEY&units=metric');
let data = await res.json();
document.getElementById('weather').innerHTML = data.weather[0].main + ' | ' + Math.round(data.main.temp)+'°C';
}
getWeather();

// DEMO NEWS
let newsData = [
{title:'Yeni layihə',desc:'Layihə başladı',img:'fotolar/Fon.jpg'},
{title:'Su xətləri',desc:'Yenilənir',img:'fotolar/Fon.jpg'}
];

let container = document.getElementById('news');
newsData.forEach((n,i)=>{
container.innerHTML += `<div class='news-card'>
<img src='${n.img}'>
<h3>${n.title}</h3>
<button onclick='openModal(${i})'>Ətraflı</button>
</div>`;
});

function openModal(i){
let n = newsData[i];
document.getElementById('modal').style.display='flex';
document.getElementById('modalContent').innerHTML=`<h2>${n.title}</h2><p>${n.desc}</p>`;
}

function closeModal(){
document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
